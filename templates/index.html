<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ settings.site_name }} — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; overflow: hidden; height: 100vh; }

/* Animated Background */
.bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, {{ settings.primary_color }}22, transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, #06B6D422, transparent),
        radial-gradient(ellipse 50% 30% at 10% 60%, #F59E0B11, transparent);
}
.bg-grid::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient({{ settings.primary_color }}15 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
}
@keyframes gridMove { to { background-position: 40px 40px; } }

/* Floating Orbs */
.orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3;
    animation: orbFloat 15s ease-in-out infinite;
}
.orb-1 { width: 400px; height: 400px; background: {{ settings.primary_color }}; top: -100px; right: -100px; animation-delay: 0s; }
.orb-2 { width: 300px; height: 300px; background: #06B6D4; bottom: -50px; left: -50px; animation-delay: -5s; }
.orb-3 { width: 200px; height: 200px; background: #F59E0B; top: 50%; left: 50%; animation-delay: -10s; }
@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -30px) scale(1.1); }
    50% { transform: translate(-20px, 20px) scale(0.9); }
    75% { transform: translate(20px, 10px) scale(1.05); }
}

/* Glass Card */
.glass {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
}
.glass-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    color: #fff;
    padding: 14px 18px;
    font-size: 15px;
    width: 100%;
    outline: none;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
}
.glass-input:focus {
    border-color: {{ settings.primary_color }};
    box-shadow: 0 0 0 3px {{ settings.primary_color }}22, 0 0 20px {{ settings.primary_color }}11;
}
.glass-input::placeholder { color: rgba(255,255,255,0.3); }

.btn-primary {
    background: linear-gradient(135deg, {{ settings.primary_color }}, {{ settings.primary_color }}cc);
    color: #fff; border: none; border-radius: 14px;
    padding: 14px 24px; font-size: 15px; font-weight: 600;
    cursor: pointer; width: 100%;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
    position: relative; overflow: hidden;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 30px {{ settings.primary_color }}44; }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-primary::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
}
.btn-primary:hover::after { animation: btnShine 0.8s ease; }
@keyframes btnShine { to { transform: translateX(100%); } }

.logo-icon {
    font-size: 48px;
    display: inline-block;
    animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

.tab-btn {
    padding: 10px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    cursor: pointer; border: none;
    transition: all 0.3s ease;
    color: rgba(255,255,255,0.5);
    background: transparent;
    font-family: 'Inter', sans-serif;
}
.tab-btn.active {
    color: #fff;
    background: rgba(255,255,255,0.1);
}

.error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #FCA5A5;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    animation: fadeIn 0.3s ease;
}

.bg-video {
    position: fixed; inset: 0; z-index: -1;
    object-fit: cover; width: 100%; height: 100%;
    opacity: 0.15;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.form-container { animation: slideUp 0.6s ease; }
</style>
</head>
<body>
{% if settings.background_video_url %}
<video class="bg-video" autoplay muted loop playsinline>
    <source src="{{ settings.background_video_url }}" type="video/mp4">
</video>
{% endif %}

<div class="bg-grid">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<!-- Hidden Audio -->
<audio id="loginAudio" preload="auto" style="display:none"></audio>

<div style="position:relative;z-index:10;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;">
    <div class="glass form-container" style="width:100%;max-width:420px;padding:40px 32px;">
        <!-- Logo & Title -->
        <div style="text-align:center;margin-bottom:32px;">
            <div class="logo-icon">{{ settings.site_logo_emoji }}</div>
            <h1 style="font-size:28px;font-weight:800;margin-top:12px;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
                {{ settings.site_name }}
            </h1>
            <p style="color:rgba(255,255,255,0.4);font-size:14px;margin-top:6px;">{{ settings.site_tagline }}</p>
        </div>

        <!-- Tabs -->
        <div style="display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,0.03);border-radius:14px;padding:4px;">
            <button class="tab-btn active" onclick="switchTab('login')" id="tab-login" style="flex:1;">Sign In</button>
            {% if settings.enable_registration == 'true' %}
            <button class="tab-btn" onclick="switchTab('register')" id="tab-register" style="flex:1;">Sign Up</button>
            {% endif %}
        </div>

        <!-- Error Message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div style="margin-bottom:16px;">
                <input type="text" class="glass-input" placeholder="Username" id="login-username" autocomplete="username" required>
            </div>
            <div style="margin-bottom:24px;">
                <input type="password" class="glass-input" placeholder="Password" id="login-password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">
                <span id="loginBtnText">Sign In</span>
                <span id="loginBtnLoader" style="display:none;">
                    <svg style="width:20px;height:20px;display:inline-block;animation:spin 1s linear infinite;" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="30 70" stroke-linecap="round"/>
                    </svg>
                </span>
            </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" onsubmit="handleRegister(event)" style="display:none;">
            <div style="margin-bottom:16px;">
                <input type="text" class="glass-input" placeholder="Username" id="reg-username" autocomplete="username" required minlength="3">
            </div>
            <div style="margin-bottom:16px;">
                <input type="email" class="glass-input" placeholder="Email (optional)" id="reg-email" autocomplete="email">
            </div>
            <div style="margin-bottom:16px;">
                <input type="password" class="glass-input" placeholder="Password (6+ chars)" id="reg-password" autocomplete="new-password" required minlength="6">
            </div>
            <div style="margin-bottom:24px;">
                <input type="password" class="glass-input" placeholder="Confirm Password" id="reg-confirm" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn-primary" id="regBtn">
                <span id="regBtnText">Create Account</span>
                <span id="regBtnLoader" style="display:none;">
                    <svg style="width:20px;height:20px;display:inline-block;animation:spin 1s linear infinite;" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="30 70" stroke-linecap="round"/>
                    </svg>
                </span>
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,0.2);">
            Secured with end-to-end encryption
        </p>
    </div>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
function switchTab(tab) {
    document.getElementById('errorMsg').style.display = 'none';
    if (tab === 'login') {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('tab-login').classList.add('active');
        const tr = document.getElementById('tab-register');
        if(tr) tr.classList.remove('active');
    } else {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('tab-register').classList.add('active');
    }
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}

function playLoginAudio(url) {
    try {
        const audio = document.getElementById('loginAudio');
        if (url && audio) {
            audio.src = url;
            audio.volume = 0.3;
            audio.play().catch(() => {});
        }
    } catch(e) {}
}

async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    document.getElementById('loginBtnText').style.display = 'none';
    document.getElementById('loginBtnLoader').style.display = 'inline-block';
    document.getElementById('errorMsg').style.display = 'none';

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-password').value
            })
        });
        const data = await res.json();
        if (data.success) {
            if (data.play_audio && data.audio_url) {
                playLoginAudio(data.audio_url);
                setTimeout(() => { window.location.href = '/chat'; }, 1500);
            } else {
                window.location.href = '/chat';
            }
        } else {
            showError(data.error || 'Login failed');
            btn.disabled = false;
            document.getElementById('loginBtnText').style.display = 'inline';
            document.getElementById('loginBtnLoader').style.display = 'none';
        }
    } catch(err) {
        showError('Connection error. Please try again.');
        btn.disabled = false;
        document.getElementById('loginBtnText').style.display = 'inline';
        document.getElementById('loginBtnLoader').style.display = 'none';
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const pw = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;
    if (pw !== confirm) { showError('Passwords do not match'); return; }

    const btn = document.getElementById('regBtn');
    btn.disabled = true;
    document.getElementById('regBtnText').style.display = 'none';
    document.getElementById('regBtnLoader').style.display = 'inline-block';
    document.getElementById('errorMsg').style.display = 'none';

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('reg-username').value,
                email: document.getElementById('reg-email').value,
                password: pw
            })
        });
        const data = await res.json();
        if (data.success) {
            if (data.play_audio && data.audio_url) {
                playLoginAudio(data.audio_url);
                setTimeout(() => { window.location.href = '/chat'; }, 1500);
            } else {
                window.location.href = '/chat';
            }
        } else {
            showError(data.error || 'Registration failed');
            btn.disabled = false;
            document.getElementById('regBtnText').style.display = 'inline';
            document.getElementById('regBtnLoader').style.display = 'none';
        }
    } catch(err) {
        showError('Connection error.');
        btn.disabled = false;
        document.getElementById('regBtnText').style.display = 'inline';
        document.getElementById('regBtnLoader').style.display = 'none';
    }
}
</script>
</body>
</html>
