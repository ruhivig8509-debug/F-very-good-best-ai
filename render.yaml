databases:
  - name: nexusai-db
    databaseName: nexusai_pro
    user: nexusai_admin
    plan: free
    region: oregon

services:
  - type: web
    name: nexusai-pro
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexusai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production